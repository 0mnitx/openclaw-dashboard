<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 20px;
    }
    
    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #38bdf8;
      font-size: 1.8rem;
    }
    
    .dashboard {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr 340px;
      gap: 20px;
    }
    
    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    
    .card h2 {
      font-size: 1rem;
      color: #94a3b8;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    /* Agent 工牌样式 */
    .agents-section {
      grid-column: 1 / -1;
    }
    
    .agents-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    
    .agent-badge {
      background: #0f172a;
      border-radius: 12px;
      padding: 16px;
      border: 2px solid #334155;
      position: relative;
      overflow: hidden;
    }
    
    .agent-badge::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: #64748b;
    }
    
    .agent-badge.active::before {
      background: linear-gradient(90deg, #22c55e, #4ade80);
      animation: glow 2s infinite;
    }
    
    @keyframes glow {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    
    .agent-badge.active {
      border-color: #22c55e;
      background: linear-gradient(135deg, #0f172a 0%, #1a2e1a 100%);
    }
    
    .agent-badge.idle {
      opacity: 0.75;
    }
    
    .agent-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    
    .agent-avatar {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      background: #334155;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      margin-right: 12px;
    }
    
    .agent-badge.active .agent-avatar {
      background: #166534;
    }
    
    .agent-info {
      flex: 1;
      min-width: 0;
    }
    
    .agent-name {
      font-weight: 700;
      font-size: 1rem;
      color: #e2e8f0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 2px;
    }
    
    .agent-type {
      font-size: 0.75rem;
      color: #64748b;
    }
    
    .agent-status-badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .agent-status-badge.active {
      background: #166534;
      color: #4ade80;
    }
    
    .agent-status-badge.idle {
      background: #334155;
      color: #94a3b8;
    }
    
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
    
    .agent-badge.active .status-dot {
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    
    .agent-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    
    .stat-item {
      background: rgba(51, 65, 85, 0.3);
      border-radius: 6px;
      padding: 8px 10px;
    }
    
    .stat-label {
      font-size: 0.65rem;
      color: #64748b;
      margin-bottom: 2px;
    }
    
    .stat-value {
      font-size: 0.85rem;
      color: #e2e8f0;
      font-weight: 500;
    }
    
    .agent-progress {
      margin-top: 12px;
    }
    
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: #94a3b8;
      margin-bottom: 4px;
    }
    
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #334155;
      border-radius: 3px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #38bdf8, #22c55e);
      border-radius: 3px;
      transition: width 0.5s ease;
    }
    
    .progress-fill.warning {
      background: linear-gradient(90deg, #f59e0b, #ef4444);
    }
    
    .progress-fill.full {
      background: #ef4444;
    }
    
    /* 系统资源 */
    .system-card {
      grid-row: span 2;
    }
    
    .metric {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #334155;
      font-size: 0.85rem;
    }
    
    .metric:last-child { border-bottom: none; }
    .metric-label { color: #94a3b8; }
    .metric-value { color: #38bdf8; font-weight: 600; }
    
    /* Token 卡片 */
    .token-card h2 { color: #f59e0b; }
    
    .token-main {
      background: rgba(245, 158, 11, 0.1);
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
      border: 1px solid rgba(245, 158, 11, 0.3);
    }
    
    .token-model-name {
      font-size: 0.9rem;
      color: #f59e0b;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .token-big-number {
      font-size: 2rem;
      font-weight: 700;
      color: #22c55e;
    }
    
    .token-big-number.warning { color: #f59e0b; }
    .token-big-number.danger { color: #ef4444; }
    
    .token-unit {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-left: 4px;
    }
    
    .token-detail {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 4px;
    }
    
    .token-reset {
      display: inline-block;
      background: rgba(56, 189, 248, 0.1);
      color: #38bdf8;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      margin-top: 6px;
    }
    
    .token-progress {
      margin-top: 12px;
    }
    
    .token-others {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #334155;
    }
    
    .token-other-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 0.8rem;
    }
    
    .token-other-name {
      color: #94a3b8;
    }
    
    .token-other-value {
      color: #e2e8f0;
      font-weight: 500;
    }
    
    .token-loading {
      text-align: center;
      padding: 40px;
      color: #64748b;
    }
    
    .refresh-btn {
      background: #38bdf8;
      color: #0f172a;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    
    .refresh-btn:hover { background: #7dd3fc; }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1400px;
      margin: 0 auto 20px;
    }
    
    .last-update {
      text-align: center;
      color: #64748b;
      font-size: 0.8rem;
      margin-top: 20px;
    }
    
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    
    .card.full-width { grid-column: 1 / -1; }
    
    .summary-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 15px;
      padding: 10px 15px;
      background: rgba(56, 189, 248, 0.1);
      border-radius: 8px;
    }
    
    .summary-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .summary-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #38bdf8;
    }
    
    .summary-label {
      font-size: 0.8rem;
      color: #94a3b8;
    }
    
    .gateway-badge {
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .gateway-badge.online {
      background: rgba(34, 197, 94, 0.1);
      color: #22c55e;
    }
    
    .gateway-badge.offline {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
    }
    
    @media (max-width: 1100px) {
      .dashboard { grid-template-columns: 1fr 1fr; }
      .agents-section { grid-column: 1 / -1; }
      .system-card { grid-column: 1 / -1; grid-row: auto; }
    }
    
    @media (max-width: 700px) {
      .dashboard { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🖥️ OpenClaw System Dashboard</h1>
    <button class="refresh-btn" onclick="fetchAll()">🔄 刷新</button>
  </div>
  
  <div class="dashboard">
    <!-- Agent 工牌区域 -->
    <div class="card agents-section">
      <div class="section-header">
        <h2>👤 Agent 工牌 <span id="gateway-badge" class="gateway-badge online"><span class="status-dot"></span>Gateway 运行中</span></h2>
      </div>
      <div class="summary-bar">
        <div class="summary-item">
          <span class="summary-value" id="total-agents">-</span>
          <span class="summary-label">个 Agent</span>
        </div>
        <div class="summary-item">
          <span class="summary-value" id="active-agents" style="color:#22c55e">-</span>
          <span class="summary-label">活跃</span>
        </div>
        <div class="summary-item">
          <span class="summary-value" id="model-name">-</span>
          <span class="summary-label">模型</span>
        </div>
      </div>
      <div class="agents-grid" id="agents-grid">
        <div class="token-loading">加载中...</div>
      </div>
    </div>
    
    <!-- 系统资源 -->
    <div class="card system-card">
      <h2>📊 系统资源</h2>
      <div id="system">
        <div class="token-loading">加载中...</div>
      </div>
    </div>
    
    <!-- Token 用量 -->
    <div class="card token-card">
      <h2>💳 Token 用量</h2>
      <div id="token">
        <div class="token-loading">加载中...</div>
      </div>
    </div>
  </div>
  
  <div class="last-update" id="last-update">最后更新: --</div>

  <script>
    async function fetchAll() {
      await Promise.all([
        fetchOpenClaw(),
        fetchSystem(),
        fetchToken()
      ]);
      document.getElementById('last-update').textContent = 
        '最后更新: ' + new Date().toLocaleString('zh-CN');
    }

    async function fetchSystem() {
      try {
        const res = await fetch('/api/system');
        const data = await res.json();
        
        const memPercent = parseFloat(data.memory.usedPercent);
        const cpuPercent = parseFloat(data.cpu);
        const diskPercent = parseInt(data.disk?.percent) || 0;
        
        document.getElementById('system').innerHTML = `
          <div class="metric">
            <span class="metric-label">主机名</span>
            <span class="metric-value">${data.hostname}</span>
          </div>
          <div class="metric">
            <span class="metric-label">运行时间</span>
            <span class="metric-value">${data.uptime}</span>
          </div>
          <div class="metric">
            <span class="metric-label">CPU (${data.cpuCores} 核)</span>
            <span class="metric-value">${data.cpu}%</span>
          </div>
          <div class="progress-bar" style="margin: 8px 0">
            <div class="progress-fill ${cpuPercent > 80 ? 'warning' : ''}" style="width: ${cpuPercent}%"></div>
          </div>
          
          <div class="metric">
            <span class="metric-label">内存</span>
            <span class="metric-value">${data.memory.used} / ${data.memory.total}</span>
          </div>
          <div class="progress-bar" style="margin: 8px 0">
            <div class="progress-fill ${memPercent > 80 ? 'warning' : ''}" style="width: ${memPercent}%"></div>
          </div>
          
          <div class="metric">
            <span class="metric-label">磁盘</span>
            <span class="metric-value">${data.disk?.used || '-'} / ${data.disk?.total || '-'}</span>
          </div>
          <div class="progress-bar" style="margin: 8px 0">
            <div class="progress-fill ${diskPercent > 80 ? 'warning' : ''}" style="width: ${diskPercent}%"></div>
          </div>
          
          <div class="metric">
            <span class="metric-label">负载</span>
            <span class="metric-value">${data.loadAvg.map(l => l.toFixed(2)).join(' / ')}</span>
          </div>
        `;
      } catch (e) {
        document.getElementById('system').innerHTML = '<div class="token-loading">加载失败</div>';
      }
    }

    async function fetchOpenClaw() {
      try {
        const res = await fetch('/api/openclaw');
        const data = await res.json();
        
        // Gateway 状态
        const gatewayBadge = document.getElementById('gateway-badge');
        if (data.gateway?.running) {
          gatewayBadge.className = 'gateway-badge online';
          gatewayBadge.innerHTML = '<span class="status-dot"></span>Gateway 运行中';
        } else {
          gatewayBadge.className = 'gateway-badge offline';
          gatewayBadge.innerHTML = '<span class="status-dot"></span>Gateway 离线';
        }
        
        // 摘要
        document.getElementById('total-agents').textContent = data.summary?.totalSessions || 0;
        document.getElementById('active-agents').textContent = data.summary?.activeSessions || 0;
        document.getElementById('model-name').textContent = data.summary?.activeModels?.[0] || '-';
        
        // Agent 工牌网格
        const grid = document.getElementById('agents-grid');
        if (!data.sessions || data.sessions.length === 0) {
          grid.innerHTML = '<div class="token-loading">暂无 Agent</div>';
          return;
        }
        
        grid.innerHTML = data.sessions.map(s => {
          const isActive = s.isActive;
          const badgeClass = isActive ? 'active' : 'idle';
          const emoji = isActive ? '🤖' : '💤';
          const statusText = isActive ? '工作中' : '空闲';
          const progressClass = s.tokenPercent > 90 ? 'full' : s.tokenPercent > 70 ? 'warning' : '';
          
          // 简化 token 显示
          const tokensDisplay = s.tokens || '-';
          
          return `
            <div class="agent-badge ${badgeClass}">
              <div class="agent-header">
                <div style="display:flex">
                  <div class="agent-avatar">${emoji}</div>
                  <div class="agent-info">
                    <div class="agent-name" title="${s.id}">${s.id}</div>
                    <div class="agent-type">${s.kind} · ${s.model}</div>
                  </div>
                </div>
                <div class="agent-status-badge ${badgeClass}">
                  <span class="status-dot"></span>
                  ${statusText}
                </div>
              </div>
              <div class="agent-stats">
                <div class="stat-item">
                  <div class="stat-label">活跃时间</div>
                  <div class="stat-value">${s.age}</div>
                </div>
                <div class="stat-item">
                  <div class="stat-label">Token</div>
                  <div class="stat-value" title="${tokensDisplay}">${tokensDisplay.split(' ')[0]}</div>
                </div>
              </div>
              <div class="agent-progress">
                <div class="progress-label">
                  <span>上下文</span>
                  <span>${s.tokenPercent}%</span>
                </div>
                <div class="progress-bar">
                  <div class="progress-fill ${progressClass}" style="width: ${s.tokenPercent}%"></div>
                </div>
              </div>
            </div>
          `;
        }).join('');
        
      } catch (e) {
        document.getElementById('agents-grid').innerHTML = '<div class="token-loading">加载失败</div>';
      }
    }

    async function fetchToken() {
      try {
        const res = await fetch('/api/token');
        const data = await res.json();
        
        if (!data.configured || data.error) {
          document.getElementById('token').innerHTML = `
            <div class="token-loading" style="padding:20px">
              ⚠️ 加载失败，请检查网络
            </div>
          `;
          return;
        }
        
        let html = '';
        
        // 主要模型
        if (data.models?.main) {
          const m = data.models.main;
          const percent = m.percent;
          const numClass = percent >= 90 ? 'danger' : percent >= 70 ? 'warning' : '';
          html += `
            <div class="token-main">
              <div class="token-model-name">${m.name} · 5小时窗口</div>
              <div class="token-big-number ${numClass}">${m.remaining}<span class="token-unit">次</span></div>
              <div class="token-detail">已用 ${m.used} · 剩余</div>
              <div class="token-reset">⏱ ${m.resetIn} 后重置</div>
              <div class="token-progress">
                <div class="progress-label">
                  <span>已用比例</span>
                  <span>${percent}%</span>
                </div>
                <div class="progress-bar">
                  <div class="progress-fill ${percent > 90 ? 'full' : percent > 70 ? 'warning' : ''}" style="width:${percent}%"></div>
                </div>
              </div>
            </div>
          `;
        }
        
        // 周额度
        if (data.weekly) {
          const w = data.weekly;
          const wPercent = Math.round((w.remaining / w.total) * 100);
          html += `
            <div class="token-other-item" style="flex-direction:column;align-items:flex-start;padding:10px 0">
              <div style="display:flex;justify-content:space-between;width:100%">
                <span style="color:#94a3b8;font-size:0.8rem">周额度</span>
                <span style="font-weight:600">${w.remaining}/${w.total}</span>
              </div>
              <div class="progress-bar" style="width:100%;margin-top:6px">
                <div class="progress-fill" style="width:${wPercent}%"></div>
              </div>
              <div style="font-size:0.7rem;color:#64748b;margin-top:4px">${w.resetIn} 后重置</div>
            </div>
          `;
        }
        
        // 其他模型
        const others = [];
        if (data.models?.speech) others.push({ name: 'Speech-HD', ...data.models.speech });
        if (data.models?.image) others.push({ name: 'Image-01', ...data.models.image });
        
        if (others.length > 0) {
          html += '<div class="token-others">';
          others.forEach(o => {
            html += `
              <div class="token-other-item">
                <span class="token-other-name">${o.name}</span>
                <span class="token-other-value">剩 ${o.remaining}/${o.total}</span>
              </div>
            `;
          });
          html += '</div>';
        }
        
        document.getElementById('token').innerHTML = html || '<div class="token-loading">暂无数据</div>';
      } catch (e) {
        document.getElementById('token').innerHTML = '<div class="token-loading" style="padding:20px">❌ 加载失败</div>';
      }
    }

    // 首次加载
    fetchAll();
    
    // 每 5 秒自动刷新
    setInterval(fetchAll, 5000);
  </script>
</body>
</html>
