<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 20px;
    }
    
    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #38bdf8;
      font-size: 1.8rem;
    }
    
    .dashboard {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    
    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    
    .card h2 {
      font-size: 1rem;
      color: #94a3b8;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .metric {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #334155;
    }
    
    .metric:last-child { border-bottom: none; }
    
    .metric-label { color: #94a3b8; }
    .metric-value { color: #38bdf8; font-weight: 600; }
    
    .status-online { color: #22c55e; }
    .status-offline { color: #ef4444; }
    
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #334155;
      border-radius: 4px;
      margin-top: 10px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #38bdf8, #22c55e);
      border-radius: 4px;
      transition: width 0.5s ease;
    }
    
    .progress-fill.warning { background: linear-gradient(90deg, #f59e0b, #ef4444); }
    
    pre {
      background: #0f172a;
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 0.75rem;
      max-height: 300px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    
    .refresh-btn {
      background: #38bdf8;
      color: #0f172a;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      margin-left: auto;
    }
    
    .refresh-btn:hover { background: #7dd3fc; }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto 20px;
    }
    
    .last-update {
      text-align: center;
      color: #64748b;
      font-size: 0.8rem;
      margin-top: 20px;
    }
    
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .card.full-width {
      grid-column: 1 / -1;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #64748b;
    }
    
    @media (max-width: 768px) {
      .dashboard { grid-template-columns: 1fr; }
      h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🖥️ OpenClaw System Dashboard</h1>
    <button class="refresh-btn" onclick="fetchAll()">🔄 刷新</button>
  </div>
  
  <div class="dashboard">
    <!-- 系统资源 -->
    <div class="card">
      <div class="section-header">
        <h2>📊 系统资源</h2>
      </div>
      <div id="system">
        <div class="loading">加载中...</div>
      </div>
    </div>
    
    <!-- OpenClaw 状态 -->
    <div class="card">
      <div class="section-header">
        <h2>🦞 OpenClaw</h2>
      </div>
      <div id="openclaw">
        <div class="loading">加载中...</div>
      </div>
    </div>
    
    <!-- Token 用量 -->
    <div class="card">
      <div class="section-header">
        <h2>💳 Token 用量</h2>
      </div>
      <div id="token">
        <div class="loading">加载中...</div>
      </div>
    </div>
    
    <!-- 原始状态 -->
    <div class="card full-width">
      <div class="section-header">
        <h2>📋 OpenClaw Status 原始输出</h2>
      </div>
      <pre id="raw-status"><span class="loading">加载中...</span></pre>
    </div>
  </div>
  
  <div class="last-update" id="last-update">最后更新: --</div>

  <script>
    async function fetchAll() {
      await Promise.all([
        fetchSystem(),
        fetchOpenClaw(),
        fetchToken()
      ]);
      document.getElementById('last-update').textContent = 
        '最后更新: ' + new Date().toLocaleString('zh-CN');
    }

    async function fetchSystem() {
      try {
        const res = await fetch('/api/system');
        const data = await res.json();
        
        const memPercent = parseFloat(data.memory.usedPercent);
        const cpuPercent = parseFloat(data.cpu);
        const diskPercent = parseInt(data.disk?.percent) || 0;
        
        document.getElementById('system').innerHTML = `
          <div class="metric">
            <span class="metric-label">主机名</span>
            <span class="metric-value">${data.hostname}</span>
          </div>
          <div class="metric">
            <span class="metric-label">平台</span>
            <span class="metric-value">${data.platform}</span>
          </div>
          <div class="metric">
            <span class="metric-label">运行时间</span>
            <span class="metric-value">${data.uptime}</span>
          </div>
          <div class="metric">
            <span class="metric-label">CPU (${data.cpuCores} 核心)</span>
            <span class="metric-value">${data.cpu}%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill ${cpuPercent > 80 ? 'warning' : ''}" 
                 style="width: ${cpuPercent}%"></div>
          </div>
          
          <div class="metric" style="margin-top: 15px">
            <span class="metric-label">内存</span>
            <span class="metric-value">${data.memory.used} / ${data.memory.total}</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill ${memPercent > 80 ? 'warning' : ''}" 
                 style="width: ${memPercent}%"></div>
          </div>
          
          <div class="metric" style="margin-top: 15px">
            <span class="metric-label">磁盘</span>
            <span class="metric-value">${data.disk?.used || '-'} / ${data.disk?.total || '-'}</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill ${diskPercent > 80 ? 'warning' : ''}" 
                 style="width: ${diskPercent}%"></div>
          </div>
          
          <div class="metric" style="margin-top: 15px">
            <span class="metric-label">负载均值</span>
            <span class="metric-value">${data.loadAvg.map(l => l.toFixed(2)).join(' / ')}</span>
          </div>
        `;
      } catch (e) {
        document.getElementById('system').innerHTML = '<div class="loading">加载失败</div>';
      }
    }

    async function fetchOpenClaw() {
      try {
        const res = await fetch('/api/openclaw');
        const data = await res.json();
        
        if (data.error) {
          document.getElementById('openclaw').innerHTML = 
            '<div class="loading">获取失败: ' + data.error + '</div>';
          return;
        }
        
        // 简化显示关键信息
        const lines = (data.data || '').split('\n');
        let gatewayStatus = '未知';
        let sessions = '未知';
        
        lines.forEach(line => {
          if (line.includes('Gateway') && line.includes('running')) {
            gatewayStatus = '<span class="status-online">● 运行中</span>';
          }
          if (line.includes('Sessions')) {
            const match = line.match(/(\d+)\s*active/);
            if (match) sessions = match[1] + ' 个活跃会话';
          }
        });
        
        document.getElementById('openclaw').innerHTML = `
          <div class="metric">
            <span class="metric-label">Gateway 状态</span>
            <span class="metric-value">${gatewayStatus}</span>
          </div>
          <div class="metric">
            <span class="metric-label">会话</span>
            <span class="metric-value">${sessions}</span>
          </div>
        `;
        
        document.getElementById('raw-status').textContent = data.data || '无数据';
      } catch (e) {
        document.getElementById('openclaw').innerHTML = '<div class="loading">加载失败</div>';
      }
    }

    async function fetchToken() {
      try {
        const res = await fetch('/api/token');
        const data = await res.json();
        
        if (!data.configured) {
          document.getElementById('token').innerHTML = `
            <div class="metric">
              <span class="metric-label">状态</span>
              <span class="metric-value" style="color:#f59e0b">⚠️ 待配置</span>
            </div>
            <div class="loading" style="padding:10px">${data.message}</div>
          `;
          return;
        }
        
        document.getElementById('token').innerHTML = `
          <div class="metric">
            <span class="metric-label">已用</span>
            <span class="metric-value">${data.used}</span>
          </div>
          <div class="metric">
            <span class="metric-label">剩余</span>
            <span class="metric-value">${data.remaining}</span>
          </div>
          <div class="metric">
            <span class="metric-label">套餐</span>
            <span class="metric-value">${data.plan}</span>
          </div>
        `;
      } catch (e) {
        document.getElementById('token').innerHTML = '<div class="loading">加载失败</div>';
      }
    }

    // 首次加载
    fetchAll();
    
    // 每 30 秒自动刷新
    setInterval(fetchAll, 30000);
  </script>
</body>
</html>
