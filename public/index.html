<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 20px;
    }
    
    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #38bdf8;
      font-size: 1.8rem;
    }
    
    .dashboard {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }
    
    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    
    .card h2 {
      font-size: 1rem;
      color: #94a3b8;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    /* OpenClaw 重点样式 */
    .card.openclaw-card {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 2px solid #38bdf8;
      grid-column: 1 / -1;
    }
    
    .card.openclaw-card h2 {
      color: #38bdf8;
      font-size: 1.2rem;
    }
    
    .session-item {
      background: #0f172a;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 10px;
      border-left: 4px solid #334155;
      transition: all 0.3s ease;
    }
    
    .session-item.active {
      border-left-color: #22c55e;
      background: linear-gradient(135deg, #0f172a 0%, #1a2e1a 100%);
    }
    
    .session-item.idle {
      border-left-color: #64748b;
      opacity: 0.7;
    }
    
    .session-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    
    .session-name {
      font-weight: 600;
      color: #e2e8f0;
      font-size: 0.9rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 300px;
    }
    
    .session-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #64748b;
    }
    
    .status-dot.active {
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .session-meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 8px;
      font-size: 0.8rem;
    }
    
    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    
    .meta-label {
      color: #64748b;
      font-size: 0.7rem;
    }
    
    .meta-value {
      color: #e2e8f0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .token-progress {
      margin-top: 8px;
    }
    
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #334155;
      border-radius: 3px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #38bdf8, #22c55e);
      border-radius: 3px;
      transition: width 0.5s ease;
    }
    
    .progress-fill.warning {
      background: linear-gradient(90deg, #f59e0b, #ef4444);
    }
    
    .progress-fill.full {
      background: #ef4444;
    }
    
    .metric {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #334155;
    }
    
    .metric:last-child { border-bottom: none; }
    .metric-label { color: #94a3b8; }
    .metric-value { color: #38bdf8; font-weight: 600; }
    
    .status-online { color: #22c55e; }
    .status-offline { color: #ef4444; }
    
    pre {
      background: #0f172a;
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 0.7rem;
      max-height: 250px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    
    .refresh-btn {
      background: #38bdf8;
      color: #0f172a;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    
    .refresh-btn:hover { background: #7dd3fc; }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1400px;
      margin: 0 auto 20px;
    }
    
    .last-update {
      text-align: center;
      color: #64748b;
      font-size: 0.8rem;
      margin-top: 20px;
    }
    
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .card.full-width { grid-column: 1 / -1; }
    
    .loading {
      text-align: center;
      padding: 30px;
      color: #64748b;
    }
    
    .summary-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 15px;
      padding: 10px 15px;
      background: rgba(56, 189, 248, 0.1);
      border-radius: 8px;
    }
    
    .summary-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .summary-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #38bdf8;
    }
    
    .summary-label {
      font-size: 0.8rem;
      color: #94a3b8;
    }
    
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #64748b;
    }
    
    @media (max-width: 900px) {
      .dashboard { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🖥️ OpenClaw Dashboard</h1>
    <button class="refresh-btn" onclick="fetchAll()">🔄 刷新</button>
  </div>
  
  <div class="dashboard">
    <!-- OpenClaw 状态（重点区域） -->
    <div class="card openclaw-card">
      <div class="section-header">
        <h2>🦞 OpenClaw 智能体状态</h2>
        <span id="gateway-badge" class="session-status">
          <span class="status-dot"></span>
          <span>检测中...</span>
        </span>
      </div>
      
      <!-- 摘要栏 -->
      <div class="summary-bar">
        <div class="summary-item">
          <span class="summary-value" id="total-sessions">-</span>
          <span class="summary-label">总会话</span>
        </div>
        <div class="summary-item">
          <span class="summary-value" id="active-sessions" style="color:#22c55e">-</span>
          <span class="summary-label">活跃</span>
        </div>
        <div class="summary-item">
          <span class="summary-value" id="model-list">-</span>
          <span class="summary-label">使用模型</span>
        </div>
      </div>
      
      <!-- 会话列表 -->
      <div id="sessions-list">
        <div class="loading">加载中...</div>
      </div>
    </div>
    
    <!-- 系统资源 -->
    <div class="card">
      <div class="section-header">
        <h2>📊 系统资源</h2>
      </div>
      <div id="system">
        <div class="loading">加载中...</div>
      </div>
    </div>
    
    <!-- Token 用量 -->
    <div class="card">
      <div class="section-header">
        <h2>💳 Token 用量</h2>
      </div>
      <div id="token">
        <div class="loading">加载中...</div>
      </div>
    </div>
    
    <!-- 原始日志（可折叠） -->
    <div class="card full-width" style="display:none">
      <div class="section-header">
        <h2>📋 OpenClaw Status 原始输出</h2>
      </div>
      <pre id="raw-status"><span class="loading">加载中...</span></pre>
    </div>
  </div>
  
  <div class="last-update" id="last-update">最后更新: --</div>

  <script>
    async function fetchAll() {
      await Promise.all([
        fetchOpenClaw(),
        fetchSystem(),
        fetchToken()
      ]);
      document.getElementById('last-update').textContent = 
        '最后更新: ' + new Date().toLocaleString('zh-CN');
    }

    async function fetchSystem() {
      try {
        const res = await fetch('/api/system');
        const data = await res.json();
        
        const memPercent = parseFloat(data.memory.usedPercent);
        const cpuPercent = parseFloat(data.cpu);
        const diskPercent = parseInt(data.disk?.percent) || 0;
        
        document.getElementById('system').innerHTML = `
          <div class="metric">
            <span class="metric-label">主机名</span>
            <span class="metric-value">${data.hostname}</span>
          </div>
          <div class="metric">
            <span class="metric-label">运行时间</span>
            <span class="metric-value">${data.uptime}</span>
          </div>
          <div class="metric">
            <span class="metric-label">CPU (${data.cpuCores} 核)</span>
            <span class="metric-value">${data.cpu}%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill ${cpuPercent > 80 ? 'warning' : ''}" 
                 style="width: ${cpuPercent}%"></div>
          </div>
          
          <div class="metric" style="margin-top: 12px">
            <span class="metric-label">内存</span>
            <span class="metric-value">${data.memory.used} / ${data.memory.total}</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill ${memPercent > 80 ? 'warning' : ''}" 
                 style="width: ${memPercent}%"></div>
          </div>
          
          <div class="metric" style="margin-top: 12px">
            <span class="metric-label">磁盘</span>
            <span class="metric-value">${data.disk?.used || '-'} / ${data.disk?.total || '-'}</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill ${diskPercent > 80 ? 'warning' : ''}" 
                 style="width: ${diskPercent}%"></div>
          </div>
          
          <div class="metric" style="margin-top: 12px">
            <span class="metric-label">负载</span>
            <span class="metric-value">${data.loadAvg.map(l => l.toFixed(2)).join(' / ')}</span>
          </div>
        `;
      } catch (e) {
        document.getElementById('system').innerHTML = '<div class="loading">加载失败</div>';
      }
    }

    async function fetchOpenClaw() {
      try {
        const res = await fetch('/api/openclaw');
        const data = await res.json();
        
        // Gateway 状态
        const gatewayBadge = document.getElementById('gateway-badge');
        if (data.gateway?.running) {
          gatewayBadge.innerHTML = '<span class="status-dot active"></span><span class="status-online">Gateway 运行中</span>';
        } else {
          gatewayBadge.innerHTML = '<span class="status-dot"></span><span class="status-offline">Gateway 离线</span>';
        }
        
        // 摘要
        document.getElementById('total-sessions').textContent = data.summary?.totalSessions || 0;
        document.getElementById('active-sessions').textContent = data.summary?.activeSessions || 0;
        document.getElementById('model-list').textContent = data.summary?.activeModels?.[0] || '-';
        
        // 会话列表
        const sessionsList = document.getElementById('sessions-list');
        if (!data.sessions || data.sessions.length === 0) {
          sessionsList.innerHTML = '<div class="empty-state">暂无活跃会话</div>';
          return;
        }
        
        sessionsList.innerHTML = data.sessions.map(s => {
          const statusClass = s.isActive ? 'active' : 'idle';
          const statusText = s.isActive ? '● 活跃' : '○ 空闲';
          const progressClass = s.tokenPercent > 90 ? 'full' : s.tokenPercent > 70 ? 'warning' : '';
          
          return `
            <div class="session-item ${statusClass}">
              <div class="session-header">
                <span class="session-name">${s.id}</span>
                <span class="session-status">
                  <span class="status-dot ${s.isActive ? 'active' : ''}"></span>
                  ${statusText}
                </span>
              </div>
              <div class="session-meta">
                <div class="meta-item">
                  <span class="meta-label">类型</span>
                  <span class="meta-value">${s.kind}</span>
                </div>
                <div class="meta-item">
                  <span class="meta-label">活动时间</span>
                  <span class="meta-value">${s.age}</span>
                </div>
                <div class="meta-item">
                  <span class="meta-label">模型</span>
                  <span class="meta-value">${s.model}</span>
                </div>
                <div class="meta-item">
                  <span class="meta-label">Token</span>
                  <span class="meta-value">${s.tokens}</span>
                </div>
              </div>
              <div class="token-progress">
                <div class="progress-bar">
                  <div class="progress-fill ${progressClass}" style="width: ${s.tokenPercent}%"></div>
                </div>
              </div>
            </div>
          `;
        }).join('');
        
        // 原始日志
        document.getElementById('raw-status').textContent = data.data || '无数据';
      } catch (e) {
        document.getElementById('sessions-list').innerHTML = '<div class="loading">加载失败: ' + e.message + '</div>';
      }
    }

    async function fetchToken() {
      try {
        const res = await fetch('/api/token');
        const data = await res.json();
        
        if (!data.configured) {
          document.getElementById('token').innerHTML = `
            <div class="metric">
              <span class="metric-label">状态</span>
              <span class="metric-value" style="color:#f59e0b">⚠️ 待配置</span>
            </div>
            <div style="padding:10px;text-align:left;font-size:0.8rem;color:#94a3b8;line-height:1.6">
              <strong style="color:#e2e8f0">配置说明：</strong><br>
              编辑 <code style="background:#0f172a;padding:2px 6px;border-radius:4px">src/server.js</code><br>
              填写 <code style="background:#0f172a;padding:2px 6px;border-radius:4px">TOKENPLAN_CONFIG</code><br><br>
              <a href="https://platform.minimaxi.com/docs/token-plan/intro" target="_blank" style="color:#38bdf8">📖 查看 TokenPlan 文档</a>
            </div>
          `;
          return;
        }
        
        if (data.error) {
          document.getElementById('token').innerHTML = `
            <div class="metric">
              <span class="metric-label">状态</span>
              <span class="metric-value" style="color:#ef4444">❌ 错误</span>
            </div>
            <div class="loading" style="padding:10px">${data.error}</div>
          `;
          return;
        }
        
        let html = '';
        
        // MiniMax-M* 主要模型
        if (data.models?.main) {
          const m = data.models.main;
          // 剩余越多越安全，用剩余算颜色
          const safePercent = 100 - m.percent;
          const colorClass = m.percent >= 90 ? 'full' : m.percent >= 70 ? 'warning' : '';
          html += `
            <div class="metric" style="margin-bottom:8px">
              <span class="metric-label">${m.name} (5小时窗口)</span>
              <span class="metric-value" style="color:${m.percent >= 90 ? '#ef4444' : m.percent >= 70 ? '#f59e0b' : '#22c55e'}">已用 ${m.used} · 剩 ${m.remaining} 次</span>
            </div>
            <div class="progress-bar" style="margin-bottom:12px">
              <div class="progress-fill ${colorClass}" style="width:${m.percent}%"></div>
            </div>
            <div class="metric" style="font-size:0.75rem">
              <span class="metric-label">剩余</span>
              <span class="metric-value">${m.remaining} 次 · ${m.resetIn}后重置</span>
            </div>
          `;
        }
        
        // 周额度
        if (data.weekly) {
          const w = data.weekly;
          const colorClass = m.percent >= 90 ? 'full' : m.percent >= 70 ? 'warning' : '';
          html += `
            <div class="metric" style="margin-top:15px;margin-bottom:8px">
              <span class="metric-label">周额度 (M*+其他)</span>
              <span class="metric-value" style="color:#94a3b8">已用 ${w.used} · 剩 ${w.remaining}</span>
            </div>
            <div class="progress-bar" style="margin-bottom:8px">
              <div class="progress-fill ${colorClass}" style="width:${Math.round((w.used/w.total)*100)}%"></div>
            </div>
            <div class="metric" style="font-size:0.75rem">
              <span class="metric-label">剩余</span>
              <span class="metric-value">${w.remaining} · ${w.resetIn}后重置</span>
            </div>
          `;
        }
        
        // 其他模型
        if (data.models?.speech) {
          const s = data.models.speech;
          html += `
            <div class="metric" style="margin-top:15px">
              <span class="metric-label">${s.name}</span>
              <span class="metric-value">${s.used}/${s.total}</span>
            </div>
          `;
        }
        
        if (data.models?.image) {
          const i = data.models.image;
          html += `
            <div class="metric">
              <span class="metric-label">${i.name}</span>
              <span class="metric-value">${i.used}/${i.total}</span>
            </div>
          `;
        }
        
        document.getElementById('token').innerHTML = html || '<div class="loading">暂无数据</div>';
      } catch (e) {
        document.getElementById('token').innerHTML = '<div class="loading">加载失败</div>';
      }
    }

    // 首次加载
    fetchAll();
    
    // 每 5 秒自动刷新
    setInterval(fetchAll, 5000);
  </script>
</body>
</html>
